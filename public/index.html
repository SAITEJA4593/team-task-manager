<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Team Task Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-bg">

    <div class="auth-box">
        <h2>Sign In</h2>
        <p>Please enter your email and password to open your dashboard.</p>

        <div id="errorBox" style="display:none; padding:0.75rem; margin-bottom:1rem; border-radius:4px; font-size:0.85rem; font-weight:600; text-align:center; background:#fee2e2; color:#b91c1c;"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Your Email Address</label>
                <input type="email" id="email" placeholder="example@company.com" required>
            </div>
            
            <div class="form-group">
                <label>Your Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>

            <button type="submit" class="btn-primary">Log In</button>
        </form>

        <p style="margin-top: 1.5rem; font-size: 0.875rem;">
            New user? <a href="register.html" style="color: #2563eb; text-decoration: none; font-weight: 600;">Create new account here</a>
        </p>
    </div>

    <div id="toast">Message</div>
    <script src="js/app.js"></script>
</body>
</html>
