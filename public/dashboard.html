<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Team Task Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <div>
            <h1 id="welcomeTitle">Loading Dashboard...</h1>
        </div>
        <div class="header-right">
            <span id="roleBadge" class="badge Member">Loading Role</span>
            <button id="logoutBtn">Log Out</button>
        </div>
    </header>

    <div class="container">
        <div class="stats-row">
            <div class="stat-box">
                <span>Total Tasks</span>
                <div id="statTotal" class="number">0</div>
            </div>
            <div class="stat-box">
                <span>Pending Tasks</span>
                <div id="statPending" class="number" style="color: #d97706;">0</div>
            </div>
            <div class="stat-box">
                <span>Completed Tasks</span>
                <div id="statDone" class="number" style="color: #15803d;">0</div>
            </div>
        </div>

        <div class="grid-layout">
            
            <div id="adminPanel" style="display: none;">
                
                <div class="card" style="margin-bottom: 1.5rem;">
                    <h3 style="margin-bottom: 1rem; color: #1e293b;">Create New Project</h3>
                    <form id="projectForm">
                        <div class="form-group">
                            <label>Project Name</label>
                            <input type="text" id="projName" placeholder="Enter project name" required>
                        </div>
                        <button type="submit" class="btn-primary">Create Project</button>
                    </form>
                </div>

                <div class="card">
                    <h3 style="margin-bottom: 1rem; color: #1e293b;">Assign New Task</h3>
                    <form id="taskForm">
                        <div class="form-group">
                            <label>Task Heading / Title</label>
                            <input type="text" id="taskTitle" placeholder="What needs to be done?" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Select Project</label>
                            <select id="taskProject" required>
                                <option value="" disabled selected>-- Select Project --</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Assign to Team Member</label>
                            <select id="taskUser" required>
                                <option value="" disabled selected>-- Select Member --</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Last Date / Due Date</label>
                            <input type="date" id="taskDue" required>
                        </div>
                        
                        <button type="submit" class="btn-primary">Assign Task</button>
                    </form>
                </div>

            </div>

            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;">
                    <h3 style="color: #1e293b;">Your Tasks List</h3>
                    
                    <div style="display: flex; gap: 0.5rem;">
                        <input type="text" id="taskSearchInput" placeholder="Search tasks here..." style="padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 0.85rem;">
                        <select id="statusFilterSelector" style="padding: 0.4rem; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 0.85rem;">
                            <option value="ALL">All Status</option>
                            <option value="Pending">Pending Only</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed Only</option>
                        </select>
                    </div>
                </div>

                <div id="tasksContainer">
                    <p style="color: #64748b; text-align: center; padding: 2rem;">Connecting to server, please wait...</p>
                </div>
            </div>

        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
