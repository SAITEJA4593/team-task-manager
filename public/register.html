<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Team Task Manager</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-bg">

    <div class="auth-box">
        <h2>Create Account</h2>
        <p>Fill your details below to register yourself in the system.</p>

        <div id="regErrorBox" style="display:none; padding:0.75rem; margin-bottom:1rem; border-radius:4px; font-size:0.85rem; font-weight:600; text-align:center; background:#fee2e2; color:#b91c1c;"></div>

        <form id="registerForm">
            <div class="form-group">
                <label>Your Full Name</label>
                <input type="text" id="regName" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label>Your Email Address</label>
                <input type="email" id="regEmail" placeholder="example@company.com" required>
            </div>

            <div class="form-group">
                <label>Set Password</label>
                <input type="password" id="regPassword" placeholder="Minimum 6 characters" required>
            </div>

            <div class="form-group">
                <label>Choose Your Role</label>
                <select id="regRole" required>
                    <option value="Member">Team Member (To check & update your tasks)</option>
                    <option value="Admin">Workspace Admin (To create projects & assign tasks)</option>
                </select>
            </div>

            <button type="submit" class="btn-primary">Register Now</button>
        </form>

        <p style="margin-top: 1.5rem; font-size: 0.875rem;">
            Already have an account? <a href="index.html" style="color: #2563eb; text-decoration: none; font-weight: 600;">Sign in here</a>
        </p>
    </div>

    <div id="toast">Message</div>
    <script src="js/app.js"></script>
</body>
</html>
